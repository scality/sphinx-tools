{%- set has_homelink = theme_homelink | default('') != '' -%}
<div class="header">
    <div class="baselogo">
        {%- if has_homelink %}<a href="{{ theme_homelink }}">{% endif %}
        <img class="baselogo"
             src="{{ pathto('_static/img/scality-documentation.png', 1) }}"
             alt="Logo"/>
        {%- if has_homelink %}</a>{% endif %}
    </div>

    {% if theme_parentlink | default('') != '' %}
    <div class="back-link">
        <a href="{{ theme_parentlink }}">back to documentation index</a>
    </div>
    {% endif %}
    <div class="quicksearch">
        {%- include "searchbox.html" %}
    </div>
</div>
